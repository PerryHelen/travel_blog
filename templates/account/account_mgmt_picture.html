{% extends "base.html" %}

{% block content %}
<!-- Content -->

<h1 class="mb-3 text-center">Change picture</h1>
<section class="mb-3 container-fluid">
    <div class="justify-content-center">
        <p>后缀: .png, .jpg, and .jpeg.</p>
        <div id="messageFileSizeDisapproved"></div>
        <form action="" method="POST" enctype="multipart/form-data">
            {{form.hidden_tag()}}
            {{form.picture.label (class="form-label")}}
            {{form.picture (class="form-control", oninput="checkFileSize(this)")}}
            <br>
            {{form.submit(class="btn ALL-green-btn-dark mb-2")}}
        </form>

    </div>
</section>

{% endblock %}
